<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>원가 계산기</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
.header{background:#fff;border-bottom:1px solid #e5e5e3;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.header-left{display:flex;align-items:center;gap:12px}
.header h1{font-size:17px;font-weight:700;letter-spacing:-.3px}
.user-badge{font-size:12px;color:#888;background:#f0f0ee;padding:3px 10px;border-radius:20px}
.container{max-width:720px;margin:0 auto;padding:24px 16px}
.tabs{display:flex;gap:0;background:#fff;border-radius:12px;border:1px solid #e5e5e3;padding:4px;margin-bottom:20px}
.tab{flex:1;padding:9px 12px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:#888;border-radius:9px;transition:all .15s;text-align:center}
.tab.active{background:#1a1a1a;color:#fff}
.panel{display:none}.panel.active{display:block}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:15px;font-weight:600}
.btn{padding:8px 16px;font-size:13px;font-weight:500;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;cursor:pointer;transition:all .15s}
.btn:hover{background:#f5f5f3}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-primary:hover{background:#333}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-danger{color:#a32d2d;border-color:#f7c1c1}
.btn-danger:hover{background:#fff5f5}
.card{background:#fff;border:1px solid #e5e5e3;border-radius:12px;padding:16px 20px;margin-bottom:12px}
.form-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:10px;flex-wrap:wrap}
.form-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:80px}
.form-group label{font-size:12px;color:#888;font-weight:500}
input,select{width:100%;padding:9px 12px;font-size:14px;border:1px solid #e0e0de;border-radius:8px;background:#fff;color:#1a1a1a;outline:none;transition:border .15s}
input:focus,select:focus{border-color:#1a1a1a}
.ingredient-item{display:flex;align-items:center;gap:8px;padding:11px 14px;background:#f9f9f7;border-radius:10px;font-size:13px;margin-bottom:8px;flex-wrap:wrap}
.ingredient-item .name{font-weight:600;flex:1.5;min-width:80px}
.ingredient-item .info{color:#888;flex:2;font-size:12px}
.menu-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#f9f9f7;border-radius:10px;font-size:13px;cursor:pointer;transition:all .15s;margin-bottom:8px;border:1px solid transparent}
.menu-item:hover{background:#fff;border-color:#ddd}
.menu-item.selected{background:#fff;border-color:#1a1a1a}
.stat-card{background:#f9f9f7;border-radius:10px;padding:14px;text-align:center}
.stat-label{font-size:11px;color:#888;margin-bottom:4px;font-weight:500}
.stat-value{font-size:20px;font-weight:600}
.green{color:#0f6e56}.blue{color:#185fa5}.amber{color:#854f0b}.red{color:#a32d2d}
.divider{border:none;border-top:1px solid #f0f0ee;margin:14px 0}
.recipe-row{display:flex;gap:6px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.recipe-row select{flex:2.5;min-width:120px}
.recipe-row input{flex:1;min-width:60px}
.recipe-row .unit{font-size:12px;color:#888;min-width:28px}
.total-row{display:grid;grid-template-columns:1fr 90px 100px;align-items:center;padding:7px 0;font-size:14px;gap:8px}
.total-row span:nth-child(2){text-align:right;color:#555}
.total-row span:nth-child(3){text-align:right}
.total-row.bold{font-weight:600;font-size:15px}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600}
.badge-blue{background:#e6f1fb;color:#185fa5}
.empty{text-align:center;padding:32px;color:#aaa;font-size:14px;line-height:1.8}
.cat-btn{padding:7px 14px;font-size:13px;font-weight:500;border:1px solid #e5e5e3;border-radius:20px;background:#fff;color:#888;cursor:pointer;transition:all .15s}
.cat-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.cat-btn:hover:not(.active){background:#f5f5f3}
.result-block{background:#f9f9f7;border-radius:12px;padding:16px;margin-top:12px}
.result-title{font-size:12px;color:#888;margin-bottom:10px;font-weight:600;letter-spacing:.5px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-top:10px}
.mine-badge{font-size:10px;background:#e6f1fb;color:#185fa5;padding:2px 6px;border-radius:10px;font-weight:600}
.others-badge{font-size:10px;background:#f0f0ee;color:#888;padding:2px 6px;border-radius:10px}
.lock-icon{font-size:11px;color:#bbb}
/* 로그인 화면 */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f5f5f3}
.login-card{background:#fff;border-radius:16px;padding:36px 32px;width:100%;max-width:360px;border:1px solid #e5e5e3}
.login-title{font-size:22px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:13px;color:#888;margin-bottom:28px}
.login-group{margin-bottom:14px}
.login-group label{display:block;font-size:12px;font-weight:600;color:#888;margin-bottom:6px}
.login-error{color:#a32d2d;font-size:12px;margin-top:8px;display:none}
/* 로딩 */
.loading{text-align:center;padding:20px;color:#aaa;font-size:13px}
@media(max-width:480px){.grid3{grid-template-columns:1fr 1fr}.form-row{flex-direction:column}}
canvas{display:none}
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-title">🧮 원가 계산기</div>
    <div class="login-sub">이름과 비밀번호를 입력해주세요</div>
    <div class="login-group">
      <label>이름</label>
      <input id="login-name" type="text" placeholder="예: 김대표" autocomplete="username">
    </div>
    <div class="login-group">
      <label>비밀번호</label>
      <input id="login-pw" type="password" placeholder="비밀번호 입력" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
    </div>
    <div id="login-error" class="login-error">이름 또는 비밀번호가 맞지 않아요.</div>
    <button class="btn btn-primary" style="width:100%;margin-top:8px;padding:12px" onclick="login()">로그인</button>
    <div style="text-align:center;margin-top:16px">
      <button class="btn btn-sm" onclick="showRegister()" style="border:none;color:#888;background:transparent;font-size:12px">처음 사용하세요? 계정 만들기</button>
    </div>
    <!-- 회원가입 -->
    <div id="register-form" style="display:none;margin-top:20px;border-top:1px solid #f0f0ee;padding-top:20px">
      <div style="font-size:13px;font-weight:600;margin-bottom:12px">새 계정 만들기</div>
      <div class="login-group">
        <label>이름</label>
        <input id="reg-name" type="text" placeholder="예: 김대표">
      </div>
      <div class="login-group">
        <label>비밀번호</label>
        <input id="reg-pw" type="password" placeholder="비밀번호 설정">
      </div>
      <div id="reg-error" style="color:#a32d2d;font-size:12px;margin-bottom:8px;display:none"></div>
      <button class="btn btn-primary" style="width:100%;padding:11px" onclick="register()">계정 만들기</button>
    </div>
  </div>
</div>

<!-- 메인 앱 -->
<div id="main-app" style="display:none">
  <div class="header">
    <div class="header-left">
      <h1>🧮 원가 계산기</h1>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="user-badge" id="user-display"></span>
      <button class="btn btn-sm" onclick="logout()">로그아웃</button>
    </div>
  </div>

  <div class="container">
    <div class="tabs">
      <button class="tab active" onclick="showTab('ingredients')">📦 재료 관리</button>
      <button class="tab" onclick="showTab('menus')">📋 메뉴 관리</button>
      <button class="tab" onclick="showTab('calculator')">💰 원가 계산</button>
    </div>

    <!-- 재료 관리 -->
    <div id="tab-ingredients" class="panel active">
      <div class="section-header">
        <span class="section-title">재료 목록 <span style="font-size:11px;color:#aaa;font-weight:400">(공용)</span></span>
        <button class="btn btn-primary btn-sm" onclick="toggleIngForm()">+ 재료 추가</button>
      </div>
      <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap" id="ing-cat-btns">
        <button class="cat-btn active" onclick="setIngCat('전체')">전체</button>
        <button class="cat-btn" onclick="setIngCat('가루')">🌾 가루</button>
        <button class="cat-btn" onclick="setIngCat('곡류')">🌾 곡류</button>
        <button class="cat-btn" onclick="setIngCat('당류')">🍯 당류</button>
        <button class="cat-btn" onclick="setIngCat('견과/씨앗')">🥜 견과/씨앗</button>
        <button class="cat-btn" onclick="setIngCat('유지')">🧈 유지</button>
        <button class="cat-btn" onclick="setIngCat('오일')">🫙 오일</button>
        <button class="cat-btn" onclick="setIngCat('앙금류')">🟤 앙금류</button>
        <button class="cat-btn" onclick="setIngCat('과일/채소')">🥦 과일/채소</button>
        <button class="cat-btn" onclick="setIngCat('한약재/향신료')">🌿 향신료</button>
        <button class="cat-btn" onclick="setIngCat('포장재')">📦 포장재</button>
        <button class="cat-btn" onclick="setIngCat('기타')">📌 기타</button>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">
        <input id="ing-search" type="text" placeholder="🔍  재료 검색..." oninput="renderIngredients()" style="background:#f9f9f7;border-color:#eee;flex:1">
        <button id="ing-sort-btn" class="btn btn-sm" onclick="toggleIngSort()" style="white-space:nowrap">가나다 ↑</button>
      </div>
      <div id="ing-form" style="display:none" class="card">
        <div id="ing-form-title" style="font-size:14px;font-weight:600;margin-bottom:12px">새 재료 등록</div>
        <div class="form-row">
          <div class="form-group" style="flex:2">
            <label>재료명</label>
            <input id="ing-name" type="text" placeholder="예: 찹쌀가루">
          </div>
          <div class="form-group">
            <label>단위</label>
            <select id="ing-unit">
              <option value="g">g</option><option value="kg">kg</option>
              <option value="ml">ml</option><option value="L">L</option>
              <option value="개">개</option><option value="장">장</option>
              <option value="봉">봉</option><option value="컵">컵</option>
              <option value="T">T (큰술)</option><option value="t">t (작은술)</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>구매 수량</label>
            <input id="ing-qty" type="number" placeholder="500" min="0" step="any">
          </div>
          <div class="form-group">
            <label>구매 금액 (원)</label>
            <input id="ing-price" type="number" placeholder="3500" min="0">
          </div>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button class="btn btn-sm" onclick="toggleIngForm()">취소</button>
          <button class="btn btn-primary btn-sm" onclick="saveIngredient()">저장</button>
        </div>
      </div>
      <div id="ingredient-list"></div>
    </div>

    <!-- 메뉴 관리 -->
    <div id="tab-menus" class="panel">
      <div class="section-header">
        <span class="section-title">메뉴 목록</span>
        <button class="btn btn-primary btn-sm" onclick="openMenuForm()">+ 메뉴 추가</button>
      </div>
      <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
        <button class="cat-btn active" onclick="setMenuCat('전체')">전체</button>
        <button class="cat-btn" onclick="setMenuCat('떡')">🍡 떡</button>
        <button class="cat-btn" onclick="setMenuCat('한과')">🍯 한과</button>
        <button class="cat-btn" onclick="setMenuCat('퓨전')">✨ 퓨전</button>
        <button class="cat-btn" onclick="setMenuCat('화과자')">🌸 화과자</button>
        <button class="cat-btn" onclick="setMenuCat('양갱')">🟣 양갱</button>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">
        <input id="menu-search" type="text" placeholder="🔍  메뉴 검색..." oninput="renderMenus()" style="background:#f9f9f7;border-color:#eee;flex:1">
        <button id="menu-sort-btn" class="btn btn-sm" onclick="toggleMenuSort()" style="white-space:nowrap">가나다 ↑</button>
      </div>
      <div id="menu-form" style="display:none" class="card">
        <div style="font-size:14px;font-weight:600;margin-bottom:12px" id="menu-form-title">새 메뉴 등록</div>
        <div class="form-row">
          <div class="form-group" style="flex:2">
            <label>메뉴명</label>
            <input id="menu-name" type="text" placeholder="예: 쑥 인절미">
          </div>
          <div class="form-group">
            <label>카테고리</label>
            <select id="menu-category">
              <option value="떡">🍡 떡</option>
              <option value="한과">🍯 한과</option>
              <option value="퓨전">✨ 퓨전</option>
              <option value="화과자">🌸 화과자</option>
              <option value="양갱">🟣 양갱</option>
            </select>
          </div>
        </div>
        <div style="font-size:12px;font-weight:600;color:#888;margin-bottom:8px">사용 재료</div>
        <div id="recipe-rows"></div>
        <button class="btn btn-sm" onclick="addRecipeRow()" style="margin-bottom:16px">+ 재료 추가</button>
        <div style="height:1px;background:#f0f0ee;margin-bottom:14px"></div>
        <div style="font-size:12px;font-weight:600;color:#888;margin-bottom:8px">기본 설정 <span style="font-weight:400;color:#bbb">(원가 계산 시 자동 입력)</span></div>
        <div class="form-row">
          <div class="form-group">
            <label>기본 생산 개수</label>
            <input id="menu-count" type="number" placeholder="예: 12" min="0.1" step="0.1">
          </div>
          <div class="form-group">
            <label>실제 판매가 (원/개)</label>
            <input id="menu-price" type="number" placeholder="예: 3500" min="0">
          </div>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button class="btn btn-sm" onclick="closeMenuForm()">취소</button>
          <button class="btn btn-primary btn-sm" onclick="saveMenu()">저장</button>
        </div>
      </div>
      <div id="menu-list"></div>
    </div>

    <!-- 원가 계산 -->
    <div id="tab-calculator" class="panel">
      <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">
        <button class="cat-btn active" onclick="setCalcCat('전체')">전체</button>
        <button class="cat-btn" onclick="setCalcCat('떡')">🍡 떡</button>
        <button class="cat-btn" onclick="setCalcCat('한과')">🍯 한과</button>
        <button class="cat-btn" onclick="setCalcCat('퓨전')">✨ 퓨전</button>
        <button class="cat-btn" onclick="setCalcCat('화과자')">🌸 화과자</button>
        <button class="cat-btn" onclick="setCalcCat('양갱')">🟣 양갱</button>
      </div>
      <div style="margin-bottom:12px">
        <input id="calc-search" type="text" placeholder="🔍  메뉴 검색..." oninput="renderCalcMenus()" style="background:#f9f9f7;border-color:#eee">
      </div>
      <div id="calc-menu-list" style="margin-bottom:12px"></div>
      <div id="calc-content" style="display:none">
        <div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
            <div style="display:flex;align-items:center;gap:8px">
              <button class="btn btn-sm" onclick="closeCalcContent()">← 목록</button>
              <div style="font-size:15px;font-weight:700" id="calc-title"></div>
            </div>
            <button class="btn btn-sm" onclick="exportImage()">⬇ 이미지 저장</button>
          </div>
          <div id="calc-summary"></div>
          <div class="divider"></div>
          <div id="calc-count" style="display:none"></div>
          <div id="calc-price" style="display:none"></div>
          <div class="grid-auto" id="calc-stats"></div>
          <div id="calc-suggest"></div>
          <div id="calc-actual" style="display:none"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<canvas id="cv"></canvas>

<script>
const SUPABASE_URL = 'https://zctbwjipncpjmmtiwjtj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_4PrVRrE5FulSCCmGXoDtIA_YPKP5w88';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let ingredients = [];
let menus = [];
let editIngId = null;
let editMenuId = null;
let selMenuId = null;
let menuCat = '전체';
let calcCat = '전체';
let ingCat = '전체';
let ingSort = false;   // false=기본순, true=가나다순
let menuSort = false;

function toggleIngSort(){
  ingSort=!ingSort;
  document.getElementById('ing-sort-btn').textContent=ingSort?'가나다 ↓':'가나다 ↑';
  renderIngredients();
}
function toggleMenuSort(){
  menuSort=!menuSort;
  document.getElementById('menu-sort-btn').textContent=menuSort?'가나다 ↓':'가나다 ↑';
  renderMenus();
}

async function login(){
  const name=document.getElementById('login-name').value.trim();
  const pw=document.getElementById('login-pw').value;
  if(!name||!pw){showError('login-error','이름과 비밀번호를 입력해주세요.');return;}
  const {data,error}=await sb.from('users').select('*').eq('name',name).eq('password',pw).single();
  if(error||!data){showError('login-error','이름 또는 비밀번호가 맞지 않아요.');return;}

  document.getElementById('main-app').style.display='block';
  document.getElementById('user-display').textContent='👤 '+currentUser.name;
  await loadAll();
}

async function register(){
  const name=document.getElementById('reg-name').value.trim();
  const pw=document.getElementById('reg-pw').value;
  if(!name||!pw){showError('reg-error','이름과 비밀번호를 입력해주세요.');return;}
  const {data:exist}=await sb.from('users').select('id').eq('name',name).single();
  if(exist){showError('reg-error','이미 사용 중인 이름이에요.');return;}

}

async function loadAll(){
  await loadIngredients();
  await loadMenus();
}

async function loadIngredients(){
  const {data}=await sb.from('ingredients').select('*').order('created_at');
  ingredients=data||[];
  renderIngredients();
}

async function loadMenus(){
  const {data}=await sb.from('menus').select('*, menu_recipes(*, ingredients(*))').order('created_at');
  menus=(data||[]).map(m=>({
    ...m,
    recipe:(m.menu_recipes||[]).map(r=>({ingId:r.ingredient_id,qty:r.qty,ing:r.ingredients}))
  }));
  renderMenus();
}

// ── 탭 ──
function showTab(name){
  ['ingredients','menus','calculator'].forEach((n,i)=>{
    document.querySelectorAll('.tab')[i].classList.toggle('active',n===name);
    document.getElementById('tab-'+n).classList.toggle('active',n===name);

// ── 재료 관리 ──
function toggleIngForm(id){
  editIngId=id||null;
  const f=document.getElementById('ing-form');
  const show=f.style.display==='none';
  f.style.display=show?'block':'none';
  if(show&&id){
    const i=ingredients.find(x=>x.id===id);
    document.getElementById('ing-form-title').textContent='재료 수정';
    document.getElementById('ing-name').value=i.name;
    document.getElementById('ing-unit').value=i.unit;
    document.getElementById('ing-qty').value=i.buy_qty;
    document.getElementById('ing-price').value=i.buy_price;
  } else if(show){
    document.getElementById('ing-form-title').textContent='새 재료 등록';
    ['ing-name','ing-qty','ing-price'].forEach(x=>document.getElementById(x).value='');
  } else {
    editIngId=null;
    document.getElementById('ing-form-title').textContent='새 재료 등록';
  }
}

async function saveIngredient(){
  const name=document.getElementById('ing-name').value.trim();
  const unit=document.getElementById('ing-unit').value;
  const qty=parseFloat(document.getElementById('ing-qty').value);
  const price=parseFloat(document.getElementById('ing-price').value);
  if(!name||isNaN(qty)||isNaN(price)||qty<=0||price<=0){alert('모든 항목을 입력해주세요.');return;}
  if(editIngId){
    await sb.from('ingredients').update({name,unit,buy_qty:qty,buy_price:price}).eq('id',editIngId);
  } else {
    await sb.from('ingredients').insert({name,unit,buy_qty:qty,buy_price:price,created_by:currentUser.id});
  }
  toggleIngForm();
  await loadIngredients();
}

async function deleteIngredient(id){
  if(!confirm('재료를 삭제할까요?'))return;
  await sb.from('ingredients').delete().eq('id',id);
  await loadIngredients();
}

function renderIngredients(){
  const el=document.getElementById('ingredient-list');
  const q=(document.getElementById('ing-search')?.value||'').toLowerCase();
  let list=ingredients.filter(i=>i.name.toLowerCase().includes(q)&&(ingCat==='전체'||getIngCatName(i.name)===ingCat));
  if(ingSort) list=[...list].sort((a,b)=>a.name.localeCompare(b.name,'ko'));
  if(!ingredients.length){el.innerHTML='<div class="empty">📦 등록된 재료가 없어요.<br>재료 추가 버튼을 눌러보세요!</div>';return;}
  if(!list.length){el.innerHTML='<div class="empty">🔍 검색 결과가 없어요.</div>';return;}
  // 카테고리별 그룹핑
  const catsOrder=['가루','곡류','당류','견과/씨앗','유지','오일','앙금류','과일/채소','한약재/향신료','포장재','기타'];
  const catEmoji={'가루':'🌾','곡류':'🌾','당류':'🍯','견과/씨앗':'🥜','유지':'🧈','오일':'🫙','앙금류':'🟤','과일/채소':'🥦','한약재/향신료':'🌿','포장재':'📦','기타':'📌'};
  if(ingCat!=='전체'){
    el.innerHTML=list.map(i=>{
      const up=(i.buy_price/i.buy_qty).toFixed(2);
      return `<div class="ingredient-item">
        <span class="name">${i.name}</span>
        <span class="info">${i.buy_qty.toLocaleString()}${i.unit} / ${i.buy_price.toLocaleString()}원
          <span class="badge badge-blue" style="margin-left:4px">${up}원/${i.unit}</span>
        </span>
        <button class="btn btn-sm" onclick="toggleIngForm(${i.id})" style="margin-right:4px">수정</button>
        <button class="btn btn-sm btn-danger" onclick="deleteIngredient(${i.id})">삭제</button>
      </div>`;
    }).join('');
  } else {
    const catMap={};
    list.forEach(i=>{const c=getIngCatName(i.name);if(!catMap[c])catMap[c]=[];catMap[c].push(i);});
    let html='';
    catsOrder.forEach(cat=>{
      if(!catMap[cat]||!catMap[cat].length)return;
      html+=`<div style="font-size:12px;font-weight:600;color:#888;margin:12px 0 6px">${catEmoji[cat]} ${cat}</div>`;
      html+=catMap[cat].map(i=>{
        const up=(i.buy_price/i.buy_qty).toFixed(2);
        return `<div class="ingredient-item">
          <span class="name">${i.name}</span>
          <span class="info">${i.buy_qty.toLocaleString()}${i.unit} / ${i.buy_price.toLocaleString()}원
            <span class="badge badge-blue" style="margin-left:4px">${up}원/${i.unit}</span>
          </span>
          <button class="btn btn-sm" onclick="toggleIngForm(${i.id})" style="margin-right:4px">수정</button>
          <button class="btn btn-sm btn-danger" onclick="deleteIngredient(${i.id})">삭제</button>
        </div>`;
      }).join('');
    });
    el.innerHTML=html;
  }
}

  renderCalcMenus();

function openMenuForm(id){
  editMenuId=id||null;
  const menu=id?menus.find(m=>m.id===id):null;
  document.getElementById('menu-form-title').textContent=menu?'메뉴 수정':'새 메뉴 등록';
  document.getElementById('menu-name').value=menu?menu.name:'';
  document.getElementById('menu-category').value=menu?.category||'떡';
  document.getElementById('menu-count').value=menu?.default_count||'';
  document.getElementById('menu-price').value=menu?.default_price||'';
  document.getElementById('recipe-rows').innerHTML='';
  if(menu&&menu.recipe.length) menu.recipe.forEach(r=>addRecipeRow(r));
  else addRecipeRow();
  document.getElementById('menu-form').style.display='block';
  document.getElementById('menu-form').scrollIntoView({behavior:'smooth',block:'start'});
}

function closeMenuForm(){document.getElementById('menu-form').style.display='none';}

function buildIngOpts(filterText, selectedId){
  const catsOrder=['가루','곡류','당류','견과/씨앗','유지','오일','앙금류','과일/채소','한약재/향신료','포장재','기타'];
  const catMap={};
  ingredients.forEach(i=>{
    if(filterText && !i.name.toLowerCase().includes(filterText.toLowerCase())) return;
    const cat=getIngCatName(i.name);
    if(!catMap[cat]) catMap[cat]=[];
    catMap[cat].push(i);
  });
  let opts='';
  catsOrder.forEach(cat=>{
    if(!catMap[cat]||!catMap[cat].length) return;
    opts+=`<optgroup label="${cat}">`;
    catMap[cat].forEach(i=>{
      opts+=`<option value="${i.id}" ${i.id==selectedId?'selected':''}>${i.name} (${i.unit})</option>`;
    });
    opts+='</optgroup>';
  });
  return opts || '<option value="">검색 결과 없음</option>';
}

function addRecipeRow(existing){
  const row=document.createElement('div');row.className='recipe-row';
  const existingIngId = existing?existing.ingId:null;
  const unit=existing?getIngUnit(existing.ingId):ingredients[0]?.unit||'';
  const uid='row_'+Date.now()+'_'+Math.random().toString(36).slice(2);
  row.innerHTML=`
    <div style="flex:2;min-width:120px;position:relative">
      <input type="text" class="recipe-ing-search" placeholder="🔍 재료 검색..." autocomplete="off"
        style="width:100%;padding:7px 10px;font-size:13px;border:1px solid #e0e0de;border-radius:8px;background:#fff"
        oninput="filterIngSelect(this)"
        onfocus="this.nextElementSibling.style.display='block'"
        onblur="setTimeout(()=>{this.nextElementSibling.style.display='none'},200)"
        value="${existing?ingredients.find(i=>i.id===existingIngId)?.name||'':''}"
      >
      <select class="recipe-ing-select" size="6"
        style="display:none;position:absolute;top:100%;left:0;width:100%;z-index:100;background:#fff;border:1px solid #ddd;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.1);max-height:200px;overflow-y:auto;font-size:13px"
        onchange="selectIngFromDropdown(this)"
      >${buildIngOpts('', existingIngId)}</select>
    </div>
    <input type="number" placeholder="분량" min="0" step="any" value="${existing?existing.qty:''}" style="flex:1;min-width:60px">
    <span class="unit" style="font-size:12px;color:#888;min-width:28px">${unit}</span>
    <input type="hidden" class="recipe-ing-id" value="${existingIngId||''}">
    <button class="btn btn-sm btn-danger" onclick="this.parentElement.remove()">✕</button>`;
  document.getElementById('recipe-rows').appendChild(row);
}

function filterIngSelect(input){
  const select=input.nextElementSibling;
  select.style.display='block';
  const q=input.value;
  select.innerHTML=buildIngOpts(q, null);
}

function selectIngFromDropdown(select){
  const row=select.closest('.recipe-row');
  const ingId=parseInt(select.value);
  const ing=ingredients.find(i=>i.id===ingId);
  if(!ing)return;
  row.querySelector('.recipe-ing-search').value=ing.name;
  row.querySelector('.recipe-ing-id').value=ingId;
  row.querySelector('.unit').textContent=ing.unit;
  select.style.display='none';
}

function getIngUnit(id){const i=ingredients.find(x=>x.id==id);return i?i.unit:'';}
function updateRowUnit(sel){sel.closest('.recipe-row').querySelector('.unit').textContent=getIngUnit(parseInt(sel.value));}

async function saveMenu(){
  const name=document.getElementById('menu-name').value.trim();
  if(!name){alert('메뉴명을 입력해주세요.');return;}
  const category=document.getElementById('menu-category').value;
  const default_count=parseFloat(document.getElementById('menu-count').value)||0;
  const default_price=parseFloat(document.getElementById('menu-price').value)||0;
  const rows=document.querySelectorAll('#recipe-rows .recipe-row');
  const recipe=[];
  rows.forEach(row=>{
    const hiddenId=row.querySelector('.recipe-ing-id');
    const ingId=hiddenId?parseInt(hiddenId.value):parseInt(row.querySelector('select')?.value);
    const qtyInput=row.querySelectorAll('input[type="number"]')[0];
    const qty=parseFloat(qtyInput?.value);
    if(ingId&&!isNaN(qty)&&qty>0) recipe.push({ingId,qty});
  });
  if(!recipe.length){alert('재료를 하나 이상 추가해주세요.');return;}

  let menuId=editMenuId;
  if(editMenuId){
    await sb.from('menus').update({name,category,default_count,default_price}).eq('id',editMenuId);
    await sb.from('menu_recipes').delete().eq('menu_id',editMenuId);
  } else {
    const {data}=await sb.from('menus').insert({name,category,default_count,default_price,created_by:currentUser.id}).select().single();
    menuId=data.id;
  }
  await sb.from('menu_recipes').insert(recipe.map(r=>({menu_id:menuId,ingredient_id:r.ingId,qty:r.qty})));
  closeMenuForm();
  await loadMenus();
}

async function deleteMenu(id){
  if(!confirm('메뉴를 삭제할까요?'))return;
  await sb.from('menus').delete().eq('id',id);
  await loadMenus();
}

function menuCost(menu){
  return (menu.recipe||[]).reduce((s,r)=>{
    const i=ingredients.find(x=>x.id===r.ingId);
    return s+(i?(i.buy_price/i.buy_qty)*r.qty:0);
  },0);
}

// ── 원가 계산 ──
function renderCalcMenus(){
  const el=document.getElementById('calc-menu-list');
  const q=(document.getElementById('calc-search')?.value||'').toLowerCase();
  const catFiltered=calcCat==='전체'?menus:menus.filter(m=>(m.category||'떡')===calcCat);
  const list=catFiltered.filter(m=>m.name.toLowerCase().includes(q));
  if(!menus.length){el.innerHTML='<div class="empty">메뉴 관리 탭에서 먼저 메뉴를 등록해주세요.</div>';return;}
  if(!list.length){el.innerHTML='<div class="empty">🔍 검색 결과가 없어요.</div>';return;}
  el.innerHTML=list.map(m=>`
    <div class="menu-item ${selMenuId===m.id?'selected':''}" onclick="selectMenu(${m.id})">
      <span style="font-weight:600">${m.name}</span>
      <span style="color:#aaa;font-size:12px">${m.category||'떡'}</span>
    </div>`).join('');
}

function closeCalcContent(){
  document.getElementById('calc-content').style.display='none';
  document.getElementById('calc-menu-list').style.display='block';
  document.getElementById('calc-search').parentElement.style.display='block';
  selMenuId=null;
  renderCalcMenus();
}

function selectMenu(id){
  selMenuId=id;
  const menu=menus.find(m=>m.id===id);if(!menu)return;
  document.getElementById('calc-count').dataset.val=menu.default_count||0;
  document.getElementById('calc-price').dataset.val=menu.default_price||0;
  document.getElementById('calc-menu-list').style.display='none';
  document.getElementById('calc-search').parentElement.style.display='none';
  document.getElementById('calc-content').style.display='block';
  document.getElementById('calc-title').textContent=menu.name;
  renderCalcSummary(menu);
  renderCalcMenus();
}

function renderCalcSummary(menu){
  let rows='';let total=0;
  (menu.recipe||[]).forEach(r=>{
    const i=ingredients.find(x=>x.id===r.ingId);if(!i)return;
    const cost=(i.buy_price/i.buy_qty)*r.qty;total+=cost;
    rows+=`<div class="total-row"><span style="color:#888">${i.name}</span><span>${r.qty}${i.unit}</span><span style="font-weight:500">${Math.round(cost).toLocaleString()}원</span></div>`;
  });
  document.getElementById('calc-summary').innerHTML=rows+`
    <div class="total-row bold" style="border-top:1px solid #f0f0ee;padding-top:10px;margin-top:4px">
      <span>총 원재료비</span><span></span><span class="blue">${Math.round(total).toLocaleString()}원</span>
    </div>`;
  recalc();
}

function recalc(){
  const menu=menus.find(m=>m.id===selMenuId);if(!menu)return;
  const total=menuCost(menu);
  const count=parseFloat(document.getElementById('calc-count').dataset.val)||0;
  const price=parseFloat(document.getElementById('calc-price').dataset.val)||0;
  const perCost=count>0?total/count:0;
  document.getElementById('calc-stats').innerHTML=`
    <div class="stat-card"><div class="stat-label">총 원재료비</div><div class="stat-value blue">${Math.round(total).toLocaleString()}원</div></div>
    <div class="stat-card"><div class="stat-label">생산 개수</div><div class="stat-value">${count>0?count+'개':'—'}</div></div>
    <div class="stat-card"><div class="stat-label">개당 원가</div><div class="stat-value amber">${count>0?Math.round(perCost).toLocaleString()+'원':'—'}</div></div>`;
  const sug=document.getElementById('calc-suggest');
  if(count>0){
    sug.innerHTML=`<div class="result-block"><div class="result-title">권장 판매가 (원가율별)</div>
      <div class="grid3">${[20,25,30].map(r=>{
        const sp=Math.round(perCost/(r/100)),pf=sp-Math.round(perCost);
        return `<div class="stat-card"><div class="stat-label">원가율 ${r}%</div><div class="stat-value green">${sp.toLocaleString()}원</div><div style="font-size:11px;color:#888;margin-top:2px">순이익 ${pf.toLocaleString()}원</div></div>`;
      }).join('')}</div></div>`;
  } else sug.innerHTML='';
  const act=document.getElementById('calc-actual');
  if(count>0&&price>0){
    const cr=((perCost/price)*100).toFixed(1),pf=price-Math.round(perCost);
    act.style.display='block';
    act.innerHTML=`<div class="result-block"><div class="result-title">실제 판매가 분석 — ${price.toLocaleString()}원/개</div>
      <div class="grid2">
        <div class="stat-card"><div class="stat-label">실제 원가율</div><div class="stat-value ${parseFloat(cr)<=25?'green':'amber'}">${cr}%</div></div>
        <div class="stat-card"><div class="stat-label">개당 순이익</div><div class="stat-value ${pf>=0?'green':'red'}">${pf.toLocaleString()}원</div></div>
        <div class="stat-card"><div class="stat-label">총 순이익 (${count}개)</div><div class="stat-value ${pf*count>=0?'green':'red'}">${(pf*count).toLocaleString()}원</div></div>
        <div class="stat-card"><div class="stat-label">총 매출</div><div class="stat-value blue">${(price*count).toLocaleString()}원</div></div>
      </div></div>`;
  } else act.style.display='none';
}

function exportImage(){
  const menu=menus.find(m=>m.id===selMenuId);if(!menu)return;
  const total=menuCost(menu);
  const count=parseFloat(document.getElementById('calc-count').dataset.val)||0;
  const price=parseFloat(document.getElementById('calc-price').dataset.val)||0;
  const perCost=count>0?total/count:0;
  const rows=(menu.recipe||[]).filter(r=>ingredients.find(i=>i.id===r.ingId));
  const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
  const pad=28;let y=0;
  let h=110+rows.length*34+80;
  if(count>0)h+=170;if(count>0&&price>0)h+=150;
  cv.width=600;cv.height=h+40;
  ctx.fillStyle='#fff';ctx.fillRect(0,0,600,cv.height);
  y=44;ctx.fillStyle='#1a1a1a';ctx.font='700 22px system-ui';ctx.fillText(menu.name,pad,y);
  y+=24;ctx.font='500 14px system-ui';ctx.fillStyle='#555';ctx.fillText('원가 계산서',pad,y);
  y+=20;ctx.font='400 12px system-ui';ctx.fillStyle='#aaa';ctx.fillText(new Date().toLocaleDateString('ko-KR'),pad,y);
  y+=18;ctx.strokeStyle='#e5e5e3';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(572,y);ctx.stroke();
  y+=24;ctx.font='600 12px system-ui';ctx.fillStyle='#888';
  ['재료','분량','단가','금액'].forEach((t,i)=>ctx.fillText(t,[pad,220,330,460][i],y));
  y+=10;ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(572,y);ctx.stroke();
  rows.forEach((r,idx)=>{
    const ing=ingredients.find(i=>i.id===r.ingId);if(!ing)return;
    y+=28;ctx.font='400 13px system-ui';ctx.fillStyle='#1a1a1a';
    ctx.fillText(ing.name,pad,y);ctx.fillText(r.qty+ing.unit,220,y);
    ctx.fillText((ing.buy_price/ing.buy_qty).toFixed(2)+'원/'+ing.unit,330,y);
    ctx.fillText(Math.round((ing.buy_price/ing.buy_qty)*r.qty).toLocaleString()+'원',460,y);
    if(idx<rows.length-1){ctx.strokeStyle='#f5f5f3';ctx.beginPath();ctx.moveTo(pad,y+8);ctx.lineTo(572,y+8);ctx.stroke();}
  });
  y+=16;ctx.strokeStyle='#ccc';ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(572,y);ctx.stroke();
  y+=24;ctx.font='700 14px system-ui';ctx.fillStyle='#185fa5';
  ctx.fillText('총 원재료비',pad,y);ctx.fillText(Math.round(total).toLocaleString()+'원',460,y);
  if(count>0){
    y+=32;ctx.fillStyle='#f9f9f7';ctx.beginPath();ctx.roundRect(pad,y-18,544,150,8);ctx.fill();
    ctx.font='500 13px system-ui';ctx.fillStyle='#555';
    ctx.fillText('생산 개수',pad+12,y);ctx.fillText(count+'개',460,y);
    y+=30;ctx.fillText('개당 원가',pad+12,y);ctx.fillStyle='#854f0b';ctx.fillText(Math.round(perCost).toLocaleString()+'원',460,y);
    [20,25,30].forEach(r=>{
      y+=30;ctx.fillStyle='#555';ctx.fillText('권장 판매가 (원가율 '+r+'%)',pad+12,y);
      const sp=Math.round(perCost/(r/100));
      ctx.fillStyle='#0f6e56';ctx.fillText(sp.toLocaleString()+'원  순이익 '+(sp-Math.round(perCost)).toLocaleString()+'원',310,y);
    });
  }
  if(count>0&&price>0){
    y+=32;ctx.fillStyle='#f0f5ff';ctx.beginPath();ctx.roundRect(pad,y-18,544,130,8);ctx.fill();
    ctx.font='500 13px system-ui';
    ctx.fillStyle='#555';ctx.fillText('실제 판매가',pad+12,y);ctx.fillStyle='#185fa5';ctx.fillText(price.toLocaleString()+'원/개',460,y);
    y+=30;const cr=((perCost/price)*100).toFixed(1);
    ctx.fillStyle='#555';ctx.fillText('원가율',pad+12,y);
    ctx.fillStyle=parseFloat(cr)<=25?'#0f6e56':'#854f0b';ctx.fillText(cr+'%',460,y);
    y+=30;const pf=price-Math.round(perCost);
    ctx.fillStyle='#555';ctx.fillText('개당 순이익',pad+12,y);
    ctx.fillStyle=pf>=0?'#0f6e56':'#a32d2d';ctx.fillText(pf.toLocaleString()+'원',460,y);
    y+=30;ctx.fillStyle='#555';ctx.fillText('총 순이익 ('+count+'개)',pad+12,y);
    const tp=pf*count;ctx.fillStyle=tp>=0?'#0f6e56':'#a32d2d';ctx.fillText(tp.toLocaleString()+'원',460,y);
  }
  const a=document.createElement('a');a.download=menu.name+'_원가계산서.png';a.href=cv.toDataURL('image/png');a.click();
}
